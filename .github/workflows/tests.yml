name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: cmd
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt pip install -r requirements.txt

      - name: Run unit tests
        shell: cmd
        run: |
          pytest -q

      - name: Validate archetypes
        shell: cmd
        run: |
          python validate_archetypes.py

      - name: Run recommendation regression tests
        shell: cmd
        run: |
          python run_regression_tests.py

      - name: Run end-to-end regression tests
        shell: cmd
        run: |
          python run_regression_tests.py --e2e
